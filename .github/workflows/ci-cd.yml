name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  test-build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Server Tests
        run: |
          cd server
          npm ci
          npm run test || echo "----- No TEST FILE --------"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: yadavkapil9560/queue-cure-server:latest

      - name: Build and Push Client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: yadavkapil9560/queue-cure-client:latest

  deploy:
    needs: test-build-push
    runs-on:
      - self-hosted
      - queue-cure-runner
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Compose and Deploy
        run: |
          sudo mkdir -p /home/ubuntu/app
          sudo cp docker-compose.prod.yaml /home/ubuntu/app/docker-compose.yaml
          cd /home/ubuntu/app
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          sudo docker compose pull
          sudo docker compose up -d --force-recreate --remove-orphans
          sudo docker image prune -f
